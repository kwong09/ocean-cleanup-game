<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Cleanup Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="screen">
        <div id="homeScreen">
            <div id="startGameButton" onclick="updateScreen('gameMenu')">

            </div>
        </div>

        <div id="gameScreen">
            <div class="startGameButtons" id="startTurtleGame" onclick="updateScreen('turtleGame')">1</div>
            <div class="startGameButtons" id="">2</div>
        </div>

        <div id="turtleGameScreen">
            <div id="talkingTurtlePerson"></div>
            <div id="talkingTurtlePersonBubble"></div>
            <div class="talkingNextButton" onclick="talkingTurtleGameNext('talkingNext')"></div>

            <div id="turtleGuessItemContainer">
                <div id="turtleGuessItem1" class="turtleGuessItem" onclick="turtleGuessItemChoice('jellyfish')"></div>
                <div id="turtleGuessItem2" class="turtleGuessItem" onclick="turtleGuessItemChoice('bag')"></div>
                <div id="turtleGuessItem3" class="turtleGuessItem" onclick="turtleGuessItemChoice('jellyfish')"></div>
            </div>

            <div id="turtleEnding"></div>
            <div id="turtleEndingBubble"></div>
        </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Cleanup Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="screen">
        <div id="homeScreen">
            <div id="gameTitleContainer">
                <div id="gameTitle" class="image"></div>
            </div>
            
            <div id="startGameButton" onclick="updateScreen('gameMenu')">
            </div>
        </div>

        <div id="gameScreen">
            <div id="startGameButtonsContainer">
                <div class="startGameButtons" id="startTurtleGame" onclick="updateScreen('turtleGame')">turtle</div>
                <div class="startGameButtons" id="startSealGame" onclick="updateScreen('sealGame')">seal</div>
                <div class="startGameButtons" id="startDolphinGame">dolphin</div>
            </div>
        </div>

        <div id="turtleGameScreen">
            <div class="talkingPerson" id="talkingTurtlePerson"></div>
            <div class="talkingPersonBubble" id="talkingTurtlePersonBubble"></div>
            <div class="nextButton" id="turtleNextButton" onclick="talkingNext('turtle')"></div>

            <div id="turtleGuessItemContainer">
                <div id="turtleGuessItem1" class="turtleGuessItem image" onclick="turtleGuessItemChoice('jellyfish')"></div>
                <div id="turtleGuessItem2" class="turtleGuessItem image" onclick="turtleGuessItemChoice('bag')"></div>
                <div id="turtleGuessItem3" class="turtleGuessItem image" onclick="turtleGuessItemChoice('jellyfish')"></div>
            </div>

            <div class="image" id="turtleEnding"></div>
            <div id="turtleEndingBubble"></div>
        </div>

        <div id="sealGameScreen">
            <div class="talkingPerson" id="talkingSealPerson"></div>
            <div class="talkingPersonBubble" id="talkingSealPersonBubble"></div>
            <div class="nextButton" id="sealNextButton" onclick="talkingNext('seal')"></div>

            <div id="sealRemoveNetContainer">
                <div class="image sealRemoveNet" id="seal"></div>
                <div class="image sealRemoveNet" id="sealNet1" onclick="sealRemoveNet(sealNet1)"></div>
                <div class="image sealRemoveNet" id="sealNet2" onclick="sealRemoveNet(sealNet2)"></div>
                <div class="image sealRemoveNet" id="sealNet3" onclick="sealRemoveNet(sealNet3)"></div>
                <div class="image sealRemoveNet" id="sealNet4" onclick="sealRemoveNet(sealNet4)"></div>
            </div>
        </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
